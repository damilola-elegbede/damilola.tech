name: Add to Cortex Board

on:
  issues:
    types: [opened, assigned, unassigned]
  pull_request:
    types: [opened, reopened, closed]

jobs:
  add-to-project:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/damilola-elegbede-org/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_TOKEN }}

  triage-to-assigned:
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move to Assigned
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
        run: |
          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"
          PROJECT_ID="PVT_kwDOD5PYVc4BR8md"
          STATUS_FIELD_ID="PVTSSF_lADOD5PYVc4BR8mdzg_n8JE"
          ASSIGNED_OPTION_ID="ac77e6ff"

          # Get the project item ID for this issue
          ITEM_ID=$(gh api graphql -f query='
            query($nodeId: ID!) {
              node(id: $nodeId) {
                ... on Issue {
                  projectItems(first: 10) {
                    nodes {
                      id
                      project { id }
                    }
                  }
                }
              }
            }' -f nodeId="$ISSUE_NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id")

          if [ -z "$ITEM_ID" ]; then
            echo "Issue not on board yet — adding first"
            ITEM_ID=$(gh api graphql -f query='
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }' -f projectId="$PROJECT_ID" -f contentId="$ISSUE_NODE_ID" --jq '.data.addProjectV2ItemById.item.id')
          fi

          # Move to Assigned status
          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: {singleSelectOptionId: $value}
              }) {
                projectV2Item { id }
              }
            }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$STATUS_FIELD_ID" -f value="$ASSIGNED_OPTION_ID"

          echo "✅ Moved to Assigned"

  assigned-to-triage:
    if: github.event_name == 'issues' && github.event.action == 'unassigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move back to Triage if no assignees
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
        run: |
          ASSIGNEE_COUNT=$(echo '${{ toJson(github.event.issue.assignees) }}' | jq 'length')
          if [ "$ASSIGNEE_COUNT" -gt 0 ]; then
            echo "Still has assignees, staying in Assigned"
            exit 0
          fi

          ISSUE_NODE_ID="${{ github.event.issue.node_id }}"
          PROJECT_ID="PVT_kwDOD5PYVc4BR8md"
          STATUS_FIELD_ID="PVTSSF_lADOD5PYVc4BR8mdzg_n8JE"
          TRIAGE_OPTION_ID="517080ff"

          ITEM_ID=$(gh api graphql -f query='
            query($nodeId: ID!) {
              node(id: $nodeId) {
                ... on Issue {
                  projectItems(first: 10) {
                    nodes {
                      id
                      project { id }
                    }
                  }
                }
              }
            }' -f nodeId="$ISSUE_NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id")

          [ -z "$ITEM_ID" ] && { echo "Not on board"; exit 0; }

          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: {singleSelectOptionId: $value}
              }) {
                projectV2Item { id }
              }
            }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$STATUS_FIELD_ID" -f value="$TRIAGE_OPTION_ID"

          echo "✅ Moved back to Triage"

  pr-to-in-review:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          PROJECT_ID="PVT_kwDOD5PYVc4BR8md"
          STATUS_FIELD_ID="PVTSSF_lADOD5PYVc4BR8mdzg_n8JE"
          IN_REVIEW_OPTION_ID="5534910d"

          # Extract issue numbers, keeping same-repo refs and bare #N,
          # discarding foreign-repo refs (e.g. ops#147).
          # Same-repo qualified forms (org/repo#N or repo#N) are accepted.
          REPO_NAME=$(echo "$REPO" | cut -d/ -f2)
          REPO_FULL="$REPO"

          # Step 1: Normalize same-repo qualified refs to bare #N
          NORMALIZED=$(echo "$PR_BODY $PR_TITLE" | sed -E "s|${REPO_FULL}#([0-9]+)|#\1|g" | sed -E "s|${REPO_NAME}#([0-9]+)|#\1|g")
          # Step 2: Remove remaining foreign-repo refs (word#N or word/word#N)
          CLEAN_TEXT=$(echo "$NORMALIZED" | sed -E 's/[a-zA-Z0-9_./-]+#[0-9]+//g')
          # Step 3: Extract bare #N
          ISSUES=$(echo "$CLEAN_TEXT" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u || true)

          if [ -z "$ISSUES" ]; then
            echo "No same-repo issue references found in PR"
            exit 0
          fi

          for ISSUE_NUM in $ISSUES; do
            echo "Processing issue #$ISSUE_NUM"

            if ! ISSUE_NODE_ID=$(gh api "repos/$REPO/issues/$ISSUE_NUM" --jq '.node_id' 2>/dev/null); then
              echo "Issue #$ISSUE_NUM not found in $REPO — skipping"
              continue
            fi
            [ -z "$ISSUE_NODE_ID" ] && { echo "Issue #$ISSUE_NUM not found in $REPO"; continue; }

            ITEM_ID=$(gh api graphql -f query='
              query($nodeId: ID!) {
                node(id: $nodeId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }' -f nodeId="$ISSUE_NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null)

            [ -z "$ITEM_ID" ] && { echo "Issue #$ISSUE_NUM not on board"; continue; }

            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: {singleSelectOptionId: $value}
                }) {
                  projectV2Item { id }
                }
              }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$STATUS_FIELD_ID" -f value="$IN_REVIEW_OPTION_ID"

            echo "✅ Issue #$ISSUE_NUM → In Review"
          done

  pr-merged-to-done:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to Done
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          PROJECT_ID="PVT_kwDOD5PYVc4BR8md"
          STATUS_FIELD_ID="PVTSSF_lADOD5PYVc4BR8mdzg_n8JE"
          DONE_OPTION_ID="7a9cbf98"

          REPO_NAME=$(echo "$REPO" | cut -d/ -f2)
          REPO_FULL="$REPO"
          NORMALIZED=$(echo "$PR_BODY $PR_TITLE" | sed -E "s|${REPO_FULL}#([0-9]+)|#\1|g" | sed -E "s|${REPO_NAME}#([0-9]+)|#\1|g")
          CLEAN_TEXT=$(echo "$NORMALIZED" | sed -E 's/[a-zA-Z0-9_./-]+#[0-9]+//g')
          ISSUES=$(echo "$CLEAN_TEXT" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u || true)

          if [ -z "$ISSUES" ]; then
            echo "No same-repo issue references found"
            exit 0
          fi

          for ISSUE_NUM in $ISSUES; do
            if ! ISSUE_NODE_ID=$(gh api "repos/$REPO/issues/$ISSUE_NUM" --jq '.node_id' 2>/dev/null); then
              echo "Issue #$ISSUE_NUM not found — skipping"
              continue
            fi
            [ -z "$ISSUE_NODE_ID" ] && continue

            ITEM_ID=$(gh api graphql -f query='
              query($nodeId: ID!) {
                node(id: $nodeId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }' -f nodeId="$ISSUE_NODE_ID" --jq ".data.node.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null)

            [ -z "$ITEM_ID" ] && continue

            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: {singleSelectOptionId: $value}
                }) {
                  projectV2Item { id }
                }
              }' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$STATUS_FIELD_ID" -f value="$DONE_OPTION_ID"

            echo "✅ Issue #$ISSUE_NUM → Done"
          done
