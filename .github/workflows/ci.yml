name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run generate-prompt
      - run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      RUN_SCORE_REGRESSION: '1'
      DAMILOLA_SCORE_API_KEY: ${{ secrets.DAMILOLA_SCORE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run generate-prompt
      - run: npm run test -- --coverage --run
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  validate-resume:
    name: Validate Resume Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch career-data submodule (soft-fail)
        continue-on-error: true
        env:
          CAREER_DATA_PAT: ${{ secrets.CAREER_DATA_PAT }}
        run: |
          if [[ -n "${CAREER_DATA_PAT}" ]]; then
            git config --global url."https://x-access-token:${CAREER_DATA_PAT}@github.com/".insteadOf "https://github.com/"
            git submodule update --init --recursive --depth=1 || \
              echo "::warning::career-data submodule fetch failed with CAREER_DATA_PAT — validation will skip"
          else
            echo "::warning::CAREER_DATA_PAT not set — skipping career-data submodule fetch (validation will skip)"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check resume-full.json presence
        id: check
        run: |
          if [[ -f career-data/data/resume-full.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::career-data submodule not checked out — skipping schema validation. Configure CAREER_DATA_PAT secret with repo access to enable hard-gating."
          fi
      - name: Run schema validation
        if: steps.check.outputs.present == 'true'
        run: npm run validate:resume
